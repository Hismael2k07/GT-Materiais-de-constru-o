<head>

<link rel="stylesheet" href="style.css">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>

<header>

<div class="logo">
    <h1>GT Materiais</h1>
    <span>Materiais de Construção</span>

<nav>

<section id="inicio" class="hero">

<button onclick="filtrar('todos')">Todos</button>

<section id="produtos">

<div id="listaProdutos" class="grid-produtos"></div>

</section>
<div class="botao-carrinho" onclick="toggleCarrinho()">
    🛒

<h3>
🛒 Carrinho
(<span id="contador">0</span>)
</h3>

<ul id="itensCarrinho"></ul>

Enviar Orçamento
</button>

<h2>Contato</h2>

<p>WhatsApp: (49) 3191-1788</p>

<a href="https://wa.me/554931911788" class="btn">
Falar Agora
</a>

</section>

href="https://wa.me/554931911788"
class="whatsapp"
target="_blank">
